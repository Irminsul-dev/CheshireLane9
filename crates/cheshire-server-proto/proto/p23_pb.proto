message ptgc_cheat_bar_bomb {
  required uint32 bomb_id = 1;
  required uint32 state = 2;
}

message ptgc_cheat_bar_card {
  required uint32 key = 1;
  required uint32 id = 2;
}

message ptgc_cheat_bar_player {
  required uint32 user_id = 1;
  required uint32 seat = 2;
  required uint32 card_num = 3;
  repeated ptgc_cheat_bar_bomb bomb_list = 4;
  required uint32 is_auto = 5;
  required uint32 round_num = 6;
  required ptgc_player player_info = 7;
}

message ptgc_game_user_view {
  required uint32 game_type = 1;
  required uint32 ship_id = 2;
  required uint32 skin_id = 3;
  required uint32 color = 4;
  repeated uint32 dress_list = 5;
}

message ptgc_load {
  required uint32 user_id = 1;
  required uint32 load = 2;
}

message ptgc_player {
  required uint32 id = 1;
  required uint32 level = 2;
  required string name = 3;
  required string guild_name = 4;
  optional .common.displayinfo display = 5;
  repeated ptgc_game_user_view user_view = 6;
}

message ptgc_player_rank {
  required ptgc_player player = 1;
  required uint32 score = 2;
}

message ptgc_room {
  required uint32 id = 1;
  required uint32 type = 2;
  required uint32 game_type = 3;
  repeated ptgc_player player_list = 4;
  repeated ptgc_team team_list = 5;
  repeated uint32 ready_list = 6;
  required uint32 play_flag = 7;
}

message ptgc_room_simple {
  required uint32 id = 1;
  required uint32 type = 2;
  required uint32 game_type = 3;
  required string name = 4;
  required uint32 player_num = 5;
  required uint32 play_flag = 6;
}

message ptgc_team {
  repeated uint32 user_id_list = 1;
}

// cmd_id = 23002
message sc_23002 {
