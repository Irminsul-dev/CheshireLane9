message tbbenefit {
  repeated tbbf actives = 1;
}

message tbbenefitval {
  required uint32 buffid = 1;
  repeated .common.kvdata benefitval = 2;
}

message tbbf {
  required uint32 id = 1;
  required uint32 round = 2;
  required uint32 is_pending = 3;
}

message tbbfchange {
  required uint32 drop_type = 1;
  required uint32 drop_id = 2;
  required uint32 positive_counter = 3;
  required uint32 negative_counter = 4;
}

message tbbfcounter {
  required uint32 group = 1;
  repeated tbbfchange change = 2;
}

message tbdisplay {
  repeated tbdrop benefit_display = 1;
  repeated tbbenefitval dollar_num_display = 2;
  repeated tbbfcounter counter = 3;
}

message tbdrop {
  required uint32 type = 1;
  required uint32 id = 2;
  required int32 number = 3;
}

message tbdrops {
  repeated tbdrop base_drop = 1;
  repeated tbdrop benefit_drop = 2;
  required tbdisplay display = 3;
}

message tbfsm {
  required uint32 system_no = 1;
  required uint32 current_node = 2;
  repeated tbfsmcache cache = 3;
  repeated tbfsm priority_fsm = 4;
  repeated uint32 tarot_selects = 5;
}

message tbfsmcache {
  repeated tbfsmcachePlan cache_plan = 1;
  repeated tbfsmcacheTalent cache_talent = 2;
  repeated tbfsmcacheSite cache_site = 3;
  repeated tbfsmcacheChat cache_chat = 4;
  repeated tbfsmcacheEnd cache_end = 5;
  repeated tbfsmcacheMind cache_mind = 6;
  repeated tbfsmcacheNin1 cache_nin1 = 7;
  repeated tbfsmcacheAffixUp cache_affix_up = 8;
  repeated tbfsmcacheTarot cache_tarot = 9;
  repeated tbfsmcacheEval cache_eval = 10;
}

message tbfsmcacheAffixUp {
}

message tbfsmcacheChat {
  required uint32 finished = 1;
  repeated uint32 chats = 2;
}

message tbfsmcacheEnd {
  repeated uint32 ends = 1;
  required uint32 select = 2;
}

message tbfsmcacheEval {
  required uint32 is_finished = 1;
}

message tbfsmcacheMind {
}

message tbfsmcacheNin1 {
  repeated tbdrop selects = 1;
  repeated uint32 reroll_count = 2;
  required uint32 is_from_shop = 3;
}

message tbfsmcachePlan {
  required uint32 cur_index = 1;
  repeated .common.kvdata plans = 2;
}

message tbfsmcacheSite {
  repeated uint32 events = 1;
  repeated uint32 shops = 2;
  repeated .common.kvdata buys = 3;
  required .common.kvdata state = 4;
  repeated uint32 character_this_round = 5;
  required uint32 refresh_count = 6;
}

message tbfsmcacheTalent {
  required uint32 finished = 1;
  repeated uint32 talents = 2;
  repeated uint32 retalents = 3;
}

message tbfsmcacheTarot {
}

message tbinfo {
  required uint32 id = 1;
  required tbfsm fsm = 2;
  required tbround round = 3;
  required tbres res = 4;
  required tbtalent talent = 5;
  required tbplan plan = 6;
  required tbsite site = 7;
  repeated .common.kvdata evaluations = 8;
  required string name = 9;
  required uint32 favor_lv = 10;
  required tbbenefit benefit = 11;
  required uint32 difficulty = 12;
  required uint32 eval_fail = 13;
  required tbdisplay display = 14;
}

message tbpermanent {
  required uint32 ng_plus_count = 1;
  repeated uint32 polaroids = 2;
  repeated uint32 endings = 3;
  repeated uint32 active_endings = 4;
  repeated uint32 tarot_archive = 5;
  required uint32 max_round = 6;
}

message tbplan {
  repeated uint32 plan_upgrade = 1;
}

message tbres {
  repeated .common.kvdata attrs = 1;
  repeated .common.kvdata resource = 2;
}

message tbround {
  required uint32 round = 1;
  required uint32 in_temp = 2;
  required uint32 temp_round = 3;
}

message tbsite {
  repeated uint32 characters = 1;
  repeated .common.kvdata work_counter = 2;
  repeated uint32 works = 3;
  repeated .common.kvdata event_counter = 4;
}

message tbtalent {
  repeated uint32 talents = 1;
}

