syntax = "proto2";

import "common_pb.proto";

package p28;

message act_info {
  required uint32 ship_id = 1;
  required uint32 type = 2;
  required uint32 act_id = 3;
  required uint32 time = 4;
}

message apa_event_info {
  required uint32 event_type = 1;
  required uint32 value = 2;
  required uint32 ship_id = 3;
}

message apartment_furniture {
  required uint32 furniture_id = 1;
  required uint32 slot_id = 2;
}

message apartment_gift {
  required uint32 gift_id = 1;
  required uint32 number = 2;
  required uint32 used_number = 3;
}

message apartment_gift_shop {
  required uint32 gift_id = 1;
  required uint32 count = 2;
}

message apartment_give_gift {
  required uint32 gift_id = 1;
  required uint32 number = 2;
}

message apartment_ins {
  required uint32 ship_group = 1;
  required uint32 care_flag = 2;
  required uint32 cur_back = 3;
  required uint32 cur_comm_id = 4;
  repeated comm_info comm_list = 5;
  repeated phone_info phone_list = 6;
  repeated friend_circle_info friend_list = 7;
}

message apartment_room {
  required uint32 id = 1;
  repeated apartment_furniture furnitures = 2;
  repeated uint32 collections = 3;
  repeated uint32 ships = 4;
}

message apartment_ship {
  required uint32 ship_group = 1;
  required uint32 favor_lv = 2;
  required uint32 favor_exp = 3;
  repeated uint32 regular_trigger = 4;
  required uint32 daily_favor = 5;
  repeated uint32 dialogues = 6;
  repeated uint32 skins = 7;
  required uint32 cur_skin = 8;
  required string name = 9;
  required uint32 name_cd = 10;
  required uint32 visit_time = 11;
  repeated skin_hidden_info hidden_info = 12;
}

message comm_info {
  required uint32 id = 1;
  required uint32 time = 2;
  required uint32 read_flag = 3;
  repeated keyvalue reply_list = 4;
}

