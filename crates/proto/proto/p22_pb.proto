// cmd_id = 22012
message sc_22012 {
  required uint32 result = 1;
}

// cmd_id = 22013
message sc_22013 {
  required uint32 proficiency = 1;
  required uint32 exp_in_well = 2;
}

// cmd_id = 22015
message sc_22015 {
  required uint32 result = 1;
}

// cmd_id = 22102
message sc_22102 {
